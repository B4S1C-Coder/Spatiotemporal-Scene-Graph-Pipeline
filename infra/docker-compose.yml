services:
  neo4j:
    image: neo4j:5-community
    container_name: scene-graph-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-your_password}"
      NEO4J_dbms_security_auth__minimum__password__length: "${NEO4J_MIN_PASSWORD_LENGTH:-8}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL_SIZE:-512m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX_SIZE:-512m}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE_SIZE:-512m}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - neo4j_import:/import
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_import:
